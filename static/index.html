<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Learning Companion</title>
  <meta name="description" content="Your personal AI-powered study companion — summaries, flashcards, spaced repetition, and quizzes." />

  <!-- Preload critical assets -->
  <link rel="preload" href="/static/css/style.css" as="style" />
  <link rel="preload" href="/static/js/app.js" as="script" crossorigin />

  <!-- Parallel-load ALL JS modules (eliminates waterfall) -->
  <link rel="modulepreload" href="/static/js/app.js" />
  <link rel="modulepreload" href="/static/js/pages/dashboard.js" />
  <link rel="modulepreload" href="/static/js/pages/browse.js" />
  <link rel="modulepreload" href="/static/js/pages/add_video.js" />
  <link rel="modulepreload" href="/static/js/pages/flashcards.js" />
  <link rel="modulepreload" href="/static/js/pages/quiz.js" />
  <link rel="modulepreload" href="/static/js/pages/review.js" />
  <link rel="modulepreload" href="/static/js/pages/stats.js" />
  <link rel="modulepreload" href="/static/js/pages/manage.js" />

  <!-- DNS prefetch for external origins -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />

  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- Aurora background orbs -->
  <div class="aurora" aria-hidden="true">
    <div class="aurora-orb orb-1"></div>
    <div class="aurora-orb orb-2"></div>
    <div class="aurora-orb orb-3"></div>
    <div class="aurora-orb orb-4"></div>
  </div>

  <!-- Confetti canvas (hidden by default) -->
  <canvas id="confetti-canvas" style="display:none"></canvas>

  <!-- App shell -->
  <div id="app">

    <!-- ── Sidebar ── -->
    <aside id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">🎓</div>
        <div>
          <div class="brand-name">AI Companion</div>
          <div class="brand-tagline">Learning Suite</div>
        </div>
      </div>

      <nav class="sidebar-nav" role="navigation">
        <span class="nav-section-label">Overview</span>
        <a class="nav-item" data-page="dashboard" id="nav-dashboard" href="#dashboard">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Dashboard</span>
        </a>

        <span class="nav-section-label">Learn</span>
        <a class="nav-item" data-page="add-video" id="nav-add-video" href="#add-video">
          <span class="nav-icon">📚</span>
          <span class="nav-label">Add Video</span>
        </a>
        <a class="nav-item" data-page="browse" id="nav-browse" href="#browse">
          <span class="nav-icon">📖</span>
          <span class="nav-label">Browse Content</span>
        </a>
        <a class="nav-item" data-page="flashcards" id="nav-flashcards" href="#flashcards">
          <span class="nav-icon">🃏</span>
          <span class="nav-label">Flashcards</span>
        </a>

        <span class="nav-section-label">Practice</span>
        <a class="nav-item" data-page="quiz" id="nav-quiz" href="#quiz">
          <span class="nav-icon">🧠</span>
          <span class="nav-label">Practice Quiz</span>
        </a>
        <a class="nav-item" data-page="review" id="nav-review" href="#review">
          <span class="nav-icon">🔁</span>
          <span class="nav-label">Daily Review</span>
          <span class="nav-badge" id="review-badge" style="display:none"></span>
        </a>

        <span class="nav-section-label">Insights</span>
        <a class="nav-item" data-page="stats" id="nav-stats" href="#stats">
          <span class="nav-icon">📈</span>
          <span class="nav-label">Statistics</span>
        </a>
        <a class="nav-item" data-page="manage" id="nav-manage" href="#manage">
          <span class="nav-icon">🗂️</span>
          <span class="nav-label">Manage Content</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="api-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text" style="flex:1;font-size:.79rem">Checking…</span>
        </div>
        <p class="sidebar-footer-note" style="margin-top:8px">☁️ Powered by Supabase</p>
      </div>
    </aside>

    <!-- Sidebar overlay (click outside to close on mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Mobile toggle -->
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu" aria-expanded="false">
      <!-- Hamburger SVG -->
      <svg id="menu-icon-ham" width="20" height="14" viewBox="0 0 20 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect y="0"  width="20" height="2" rx="1" fill="currentColor"/>
        <rect y="6"  width="14" height="2" rx="1" fill="currentColor"/>
        <rect y="12" width="20" height="2" rx="1" fill="currentColor"/>
      </svg>
      <!-- Close X SVG (hidden by default) -->
      <svg id="menu-icon-close" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:none">
        <line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- Main -->
    <main id="main-content">
      <div id="page-content"></div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>



  <!-- SVG defs for ring gradient -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="teal-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#00e5cc"/>
        <stop offset="100%" stop-color="#0ea5e9"/>
      </linearGradient>
      <linearGradient id="amber-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#f59e0b"/>
        <stop offset="100%" stop-color="#ef4444"/>
      </linearGradient>
    </defs>
  </svg>

  <script src="/static/js/app.js" type="module"></script>
</body>
</html>
