<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Learning Companion</title>
  <meta name="description" content="Your personal AI-powered study companion — summaries, flashcards, spaced repetition, and quizzes." />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- Aurora background orbs -->
  <div class="aurora" aria-hidden="true">
    <div class="aurora-orb orb-1"></div>
    <div class="aurora-orb orb-2"></div>
    <div class="aurora-orb orb-3"></div>
    <div class="aurora-orb orb-4"></div>
  </div>

  <!-- Confetti canvas (hidden by default) -->
  <canvas id="confetti-canvas" style="display:none"></canvas>

  <!-- App shell -->
  <div id="app">

    <!-- ── Sidebar ── -->
    <aside id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">🎓</div>
        <div>
          <div class="brand-name">AI Companion</div>
          <div class="brand-tagline">Learning Suite</div>
        </div>
      </div>

      <nav class="sidebar-nav" role="navigation">
        <span class="nav-section-label">Overview</span>
        <a class="nav-item" data-page="dashboard" id="nav-dashboard" href="#dashboard">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Dashboard</span>
        </a>

        <span class="nav-section-label">Learn</span>
        <a class="nav-item" data-page="add-video" id="nav-add-video" href="#add-video">
          <span class="nav-icon">📚</span>
          <span class="nav-label">Add Video</span>
        </a>
        <a class="nav-item" data-page="browse" id="nav-browse" href="#browse">
          <span class="nav-icon">📖</span>
          <span class="nav-label">Browse Content</span>
        </a>
        <a class="nav-item" data-page="flashcards" id="nav-flashcards" href="#flashcards">
          <span class="nav-icon">🃏</span>
          <span class="nav-label">Flashcards</span>
        </a>

        <span class="nav-section-label">Practice</span>
        <a class="nav-item" data-page="quiz" id="nav-quiz" href="#quiz">
          <span class="nav-icon">🧠</span>
          <span class="nav-label">Practice Quiz</span>
        </a>
        <a class="nav-item" data-page="review" id="nav-review" href="#review">
          <span class="nav-icon">🔁</span>
          <span class="nav-label">Daily Review</span>
          <span class="nav-badge" id="review-badge" style="display:none"></span>
        </a>

        <span class="nav-section-label">Insights</span>
        <a class="nav-item" data-page="stats" id="nav-stats" href="#stats">
          <span class="nav-icon">📈</span>
          <span class="nav-label">Statistics</span>
        </a>
        <a class="nav-item" data-page="manage" id="nav-manage" href="#manage">
          <span class="nav-icon">🗂️</span>
          <span class="nav-label">Manage Content</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="api-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text" style="flex:1;font-size:.79rem">Checking…</span>
        </div>
        <button class="btn btn-ghost btn-sm btn-full" id="configure-key-btn">🔑 Configure API Key</button>
        <p class="sidebar-footer-note" style="margin-top:8px">Data stored locally on your device</p>
      </div>
    </aside>

    <!-- Mobile toggle -->
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">☰</button>

    <!-- Main -->
    <main id="main-content">
      <div id="page-content"></div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <!-- API Key Modal -->
  <div id="api-key-modal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <h2 class="modal-title">🔑 Gemini API Key</h2>
      <p class="modal-desc">
        Get your free key at <a href="https://aistudio.google.com/" target="_blank" class="link">aistudio.google.com</a>
      </p>
      <input type="password" id="api-key-input" class="form-input" placeholder="AIzaSy…" autocomplete="off" />
      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancel-key-btn">Cancel</button>
        <button class="btn btn-teal" id="save-key-btn"><span class="btn-text">💾 Save Key</span></button>
      </div>
    </div>
  </div>

  <!-- SVG defs for ring gradient -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="teal-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#00e5cc"/>
        <stop offset="100%" stop-color="#0ea5e9"/>
      </linearGradient>
      <linearGradient id="amber-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#f59e0b"/>
        <stop offset="100%" stop-color="#ef4444"/>
      </linearGradient>
    </defs>
  </svg>

  <script src="/static/js/app.js" type="module"></script>
</body>
</html>
